<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Olaniyi Dewale</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        .success-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background-color: #0f0f0f;
            color: #fff;
        }

        .success-page h1 {
            color: #FF6B00;
            margin-bottom: 20px;
            font-size: 3rem;
        }

        .success-page p {
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: #aaa;
            max-width: 500px;
        }

        .success-page a {
            display: inline-block;
            padding: 12px 30px;
            background-color: #FF6B00;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .success-page a:hover {
            background-color: #e65a00;
        }
    </style>
</head>

<body>
    <div class="success-page">
        <h1>Thank You!</h1>
        <p>Your message has been successfully sent. I will get back to you as soon as possible.</p>
        <a href="/">Return to Homepage</a>
    </div>
</body>

</html>
